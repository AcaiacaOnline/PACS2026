version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: pac_mongodb
    restart: always
    environment:
      MONGO_INITDB_DATABASE: pac_acaiaca
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - pac_network

  backend:
    build: ./backend
    container_name: pac_backend
    restart: always
    depends_on:
      - mongodb
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=pac_acaiaca
      - JWT_SECRET=${JWT_SECRET:-pac-secret-key-change-in-production}
      - CORS_ORIGINS=*
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app/backend
    networks:
      - pac_network
    command: uvicorn server:app --host 0.0.0.0 --port 8001 --reload

  frontend:
    build: ./frontend
    container_name: pac_frontend
    restart: always
    depends_on:
      - backend
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:8001
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    networks:
      - pac_network
    command: yarn start

  nginx:
    image: nginx:alpine
    container_name: pac_nginx
    restart: always
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - pac_network

volumes:
  mongodb_data:

networks:
  pac_network:
    driver: bridge
